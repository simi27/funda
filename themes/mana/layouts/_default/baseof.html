<!doctype html>
<html lang="{{ site.Language.LanguageCode }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <header class="site-header">
      <div class="header-container">
        {{ partial "header.html" . }}
      </div>
    </header>

    <main id="main-content" role="main">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
      {{ partial "footer.html" . }}
    </footer>
  </body>
</html>
