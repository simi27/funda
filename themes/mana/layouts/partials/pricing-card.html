<!-- Pricing Card partial — accepts a single tier dict -->
{{ $tier := . }}
<div class="pricing-card{{ if $tier.featured }} featured{{ end }}">
  <div class="pricing-name"><span class="pfx">funda</span>{{ $tier.product | default (printf "MAIL %s" $tier.name) }}</div>
  <div class="pricing-amount">{{ $tier.price }}<small>{{ $tier.period }}</small></div>
  <div class="pricing-period">{{ $tier.sub }}</div>
  <div class="pricing-divider"></div>
  <ul class="pricing-features">
    {{ range $tier.features }}
    <li>
      <span class="check">✓</span>
      {{ if .highlight }}<strong>{{ .text }}</strong>{{ else }}{{ .text }}{{ end }}
    </li>
    {{ end }}
  </ul>
  <a href="{{ $tier.ctaUrl }}" class="pricing-cta">{{ $tier.ctaText }}</a>
</div>
