# ══════════════════════════════════════════════
# funda — Hugo Configuration
# Every value below drives a component on the page.
# Change data here, not in templates.
# ══════════════════════════════════════════════

baseURL = 'https://funda.africa/'
languageCode = 'en'
title = 'funda'
theme = 'mana'
disableKinds = ['taxonomy', 'term', 'RSS', 'sitemap', 'section']

[outputs]
  home = ['HTML']

# ═══════════ Navigation ═══════════
# Rendered by partials/header.html via Hugo's menu system
[[menus.main]]
  name = "Pricing"
  url = "#pricing"
  weight = 20

[[menus.main]]
  name = "FAQ"
  url = "#faq"
  weight = 30

[[menus.main]]
  name = "Contact"
  url = "#contact"
  weight = 40

# ═══════════ Params — drives all page content ═══════════

[params]
  description = "Building the digital fundamentals for Africa. Professional email, domains, websites, and hosting — done properly."
  author = "funda"

  # Hero
  heroTagline = "Everything starts with the fundamentals."
  heroPills = "Websites · Email · Domains · Hosting"
  heroCtaText = "Learn More"
  heroCtaUrl = "#faq"
  heroCycles = ["MENTALS", "WEB", "MAIL", "DOMAIN", "HOSTING"]
  heroRotateInterval = 2600   # ms between rotations (0 to disable)

  # Ticker — ambient marquee, pure CSS animation
  tickerAnchor = "THE FUNDAMENTALS"
  tickerHeroEnabled = false
  tickerStripEnabled = true

  # Section labels (JetBrains Mono metadata text)
  railLabel = "Services"
  pricingLabel = "Email Hosting — month to month, cancel anytime"
  whyLabel = "The fundamentals, done properly"
  faqLabel = "The fundamentals — explained"

  # CTA / Contact
  ctaHeading = "Get to know us, Share Your Ideas, Let's Connect"
  ctaSubheading = "No commitment. No payment. Just a conversation about what you need — we'll align on the right solution and send you a clear proposal."
  ctaEmail = "hello@funda.africa"
  ctaPhone = "+27 65 969 3995"
  ctaWhatsApp = "27659693995"
  ctaPhoneTZ = "+255 79 699 9195"
  ctaWhatsAppTZ = "255796999195"
  ctaLocation = "Durban, South Africa"
  ctaMailtoSubject = "Let's get started"

  # Why funda cards
  [[params.why]]
    icon = "⚡"
    title = "Fast Setup"
    description = "Your email and site are live within 24 hours. No tech skills needed."

  [[params.why]]
    icon = "🔒"
    title = "Secure by Default"
    description = "Spam filters, virus scanning, and managed SSL on every account."

  [[params.why]]
    icon = "📱"
    title = "Any Device"
    description = "Access your email on your phone, laptop, or via webmail — anywhere."

  [[params.why]]
    icon = "🇿🇦"
    title = "South African Support"
    description = "Local support when you need it. No chatbots, just real people."

  # FAQ
  [[params.faq]]
    question = "What exactly do I get?"
    answer = "A professional email address at your own domain (e.g. you@yourcompany.co.za). Webmail access, spam & virus protection, and the ability to send/receive from any device. Plus free SSL and DNS management."

  [[params.faq]]
    question = "Can I use my own domain?"
    answer = "Absolutely. You can bring any domain you own, or we'll register one for you. We'll point it to our mail servers — free of charge."

  [[params.faq]]
    question = "Is there a contract?"
    answer = "Nope. Month-to-month, cancel anytime. No long-term lock-in."

  [[params.faq]]
    question = "Can I check email on my phone?"
    answer = "Yes. Webmail works in any browser, or set up your email in the Gmail app, Apple Mail, Outlook — anything that supports IMAP."

  [[params.faq]]
    question = "Do you build websites?"
    answer = "Yes — fundaWEB. We build fast, secure websites. Perfect for small businesses who want a professional online presence without WordPress headaches."

  [[params.faq]]
    question = "How is funda different?"
    answer = "We focus on the fundamentals — done properly. Professional email at your domain, transparent pricing, no upsells, and local support. We keep it simple so you can get on with business."

  # Social / contact
  [params.social]
    email = "hello@funda.africa"

  # Copyright
  [params.copyright]
    startYear = 2025
    owner = "funda"

  # Footer
  footerText = "Everything starts with the fundamentals."
  footerLocation = "South Africa 🇿🇦"

# ═══════════ Services — drives hero rotator, rail, cards ═══════════
# These are the LIVE services. Add new ones only when they actually ship.
# Each service gets: a short code (suffix), display name, and description.

[[params.services]]
  code = "WEB"
  name = "fundaWEB"
  description = "Websites"

[[params.services]]
  code = "MAIL"
  name = "fundaMAIL"
  description = "Professional Email"

[[params.services]]
  code = "DOMAIN"
  name = "fundaDOMAIN"
  description = "Your Online Identity"

[[params.services]]
  code = "HOSTING"
  name = "fundaHOSTING"
  description = "Fast & Secure Hosting"

