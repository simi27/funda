  # Why funda cards
  [[params.why]]
    icon = "⚡"
    title = "Fast Setup"
    description = "Your email and site are live within 24 hours. No tech skills needed."

  [[params.why]]
    icon = "🔒"
    title = "Secure by Default"
    description = "Spam filters, virus scanning, and managed SSL on every account."

  [[params.why]]
    icon = "📱"
    title = "Any Device"
    description = "Access your email on your phone, laptop, or via webmail — anywhere."

  [[params.why]]
    icon = "🌍"
    title = "Pan-African Reach"
    description = "Africa HQ in South Africa, with clients across Tanzania, Kenya, Malawi, Nigeria, and the USA."

  # FAQ
  [[params.faq]]
    question = "What exactly do I get?"
    answer = "A professional email address at your own domain (e.g. you@yourcompany.co.za). Webmail access, spam & virus protection, and the ability to send/receive from any device. Plus free SSL and DNS management."

  [[params.faq]]
    question = "Can I use my own domain?"
    answer = "Absolutely. You can bring any domain you own, or we'll register one for you — .co.za (SA), .tz (Tanzania), .ke (Kenya), .ng (Nigeria), .mw (Malawi), .com, and more. We'll point it to our mail servers — free of charge."

  [[params.faq]]
    question = "Is there a contract?"
    answer = "Nope. Month-to-month, cancel anytime. No long-term lock-in."

  [[params.faq]]
    question = "Can I check email on my phone?"
    answer = "Yes. Webmail works in any browser, or set up your email in the Gmail app, Apple Mail, Outlook — anything that supports IMAP."

  [[params.faq]]
    question = "Do you build websites?"
    answer = "Yes — fundaWEB. We build fast, secure websites. Perfect for small businesses who want a professional online presence without WordPress headaches."

  [[params.faq]]
    question = "How is funda different?"
    answer = "We focus on the fundamentals — done properly. Professional email at your domain, transparent pricing, no upsells, and support when you need it. We keep it simple so you can get on with business — wherever you are in Africa or the USA."

  # Social / contact
  [params.social]
    email = "hello@funda.africa"

  # Copyright
  [params.copyright]
    startYear = 2025
    owner = "funda"

  # Footer
  footerText = "Everything starts with the fundamentals."
  footerLocation = "Serving Africa & the USA"

  # Geo-currency — IP detection maps country to local currency
  [[params.currencies]]
    code = "ZAR"
    symbol = "R"
    name = "South African Rand"
    rate = 1.0
    countries = ["ZA", "LS", "SZ", "NA"]

  [[params.currencies]]
    code = "NGN"
    symbol = "₦"
    name = "Nigerian Naira"
    rate = 84.0
    countries = ["NG"]

  [[params.currencies]]
    code = "MWK"
    symbol = "MK"
    name = "Malawian Kwacha"
    rate = 98.0
    countries = ["MW"]

  [[params.currencies]]
    code = "KES"
    symbol = "KSh"
    name = "Kenyan Shilling"
    rate = 7.5
    countries = ["KE"]

  [[params.currencies]]
    code = "USD"
    symbol = "$"
    name = "US Dollar"
    rate = 0.055
    countries = ["US", "default"]

